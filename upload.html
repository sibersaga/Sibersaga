<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Upload Foto - SDN 3 Purwosari</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            margin-bottom: 30px;
            color: #333;
            text-align: center;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 20px;
        }

        .upload-area:hover {
            background: #f0f0f0;
            border-color: #764ba2;
        }

        .upload-area.drag-over {
            background: #e8eaf6;
            border-color: #764ba2;
        }

        #file-input {
            display: none;
        }

        .file-icon {
            font-size: 48px;
            margin-bottom: 10px;
        }

        .upload-text {
            color: #666;
            margin-bottom: 10px;
        }

        .upload-text small {
            display: block;
            color: #999;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .preview {
            margin-top: 20px;
            text-align: center;
        }

        .preview img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .preview video {
            max-width: 100%;
            max-height: 300px;
            border-radius: 5px;
            margin-bottom: 10px;
        }

        .file-name {
            color: #666;
            font-size: 14px;
            margin: 10px 0;
        }

        .success {
            background: #4caf50;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .success.show {
            display: block;
        }

        .error {
            background: #f44336;
            color: white;
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .url-result {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            display: none;
        }

        .url-result.show {
            display: block;
        }

        .url-result textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
        }

        .copy-btn {
            margin-top: 10px;
            padding: 8px 16px;
            background: #2196F3;
            font-size: 14px;
            width: auto;
        }

        .copy-btn:hover {
            background: #1976D2;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>📸 Upload Foto Sekolah</h1>

        <form id="upload-form">
            <!-- Upload Area -->
            <div class="upload-area" id="upload-area">
                <div class="file-icon">📁</div>
                <div class="upload-text">
                    Drag dan drop file di sini
                    <small>atau klik untuk pilih</small>
                </div>
                <input type="file" id="file-input" accept="image/*,video/*,application/pdf" required />
            </div>

            <div class="preview" id="preview"></div>
            <div class="file-name" id="file-name"></div>

            <!-- Form Info -->
            <div class="form-group">
                <label for="nama">Nama Pengguna</label>
                <input type="text" id="nama" placeholder="Nama Anda" required />
            </div>

            <div class="form-group">
                <label for="deskripsi">Deskripsi</label>
                <textarea id="deskripsi" placeholder="Jelaskan foto/video ini..."></textarea>
            </div>

            <!-- Loading -->
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p style="margin-top: 10px; color: #667eea;">Sedang upload...</p>
            </div>

            <!-- Button -->
            <button type="submit" id="submit-btn">Upload Sekarang</button>

            <!-- Success Message -->
            <div class="success" id="success">
                ✅ Upload berhasil!
            </div>

            <!-- Error Message -->
            <div class="error" id="error"></div>

            <!-- URL Result -->
            <div class="url-result" id="url-result">
                <label>URL Media (copy untuk dipakai):</label>
                <textarea id="result-url" readonly></textarea>
                <button type="button" class="copy-btn" id="copy-btn">📋 Copy URL</button>
            </div>
        </form>
    </div>

    <script>
        // Ambil dari environment variables (untuk production)
        // Atau hardcode untuk testing
        const CLOUDINARY_CLOUD_NAME = zt8oqqx2; // Ganti dengan milik Anda
        const CLOUDINARY_UPLOAD_PRESET = my_upload_preset; // Ganti dengan milik Anda

        const uploadArea = document.getElementById('upload-area');
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const fileName = document.getElementById('file-name');
        const form = document.getElementById('upload-form');
        const loading = document.getElementById('loading');
        const submitBtn = document.getElementById('submit-btn');
        const successMsg = document.getElementById('success');
        const errorMsg = document.getElementById('error');
        const urlResult = document.getElementById('url-result');
        const resultUrl = document.getElementById('result-url');
        const copyBtn = document.getElementById('copy-btn');

        let selectedFile = null;

        // Click to upload
        uploadArea.addEventListener('click', () => fileInput.click());

        // File selected
        fileInput.addEventListener('change', (e) => {
            selectedFile = e.target.files[0];
            handleFileSelect(selectedFile);
        });

        // Drag and drop
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('drag-over');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('drag-over');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('drag-over');
            selectedFile = e.dataTransfer.files[0];
            fileInput.files = e.dataTransfer.files;
            handleFileSelect(selectedFile);
        });

        // Handle file selection
        function handleFileSelect(file) {
            if (!file) return;

            fileName.textContent = `File: ${file.name} (${(file.size / 1024).toFixed(2)} KB)`;

            // Show preview
            const reader = new FileReader();
            reader.onload = (e) => {
                preview.innerHTML = '';

                if (file.type.startsWith('image/')) {
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    preview.appendChild(img);
                } else if (file.type.startsWith('video/')) {
                    const video = document.createElement('video');
                    video.controls = true;
                    video.src = e.target.result;
                    preview.appendChild(video);
                } else if (file.type === 'application/pdf') {
                    preview.innerHTML = '<div>📄 PDF selected: ' + file.name + '</div>';
                }
            };
            reader.readAsDataURL(file);
        }

        // Form submit
        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            if (!selectedFile) {
                showError('Pilih file terlebih dahulu!');
                return;
            }

            await uploadToCloudinary(selectedFile);
        });

        // Upload to Cloudinary
        async function uploadToCloudinary(file) {
            const formData = new FormData();
            formData.append('file', file);
            formData.append('upload_preset', CLOUDINARY_UPLOAD_PRESET);
            formData.append('folder', 'SDN3Purwosari'); // Folder di Cloudinary

            loading.style.display = 'block';
            submitBtn.disabled = true;
            successMsg.classList.remove('show');
            errorMsg.classList.remove('show');
            urlResult.classList.remove('show');

            try {
                const response = await fetch(
                    `https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/upload`,
                    {
                        method: 'POST',
                        body: formData
                    }
                );

                if (!response.ok) {
                    throw new Error('Upload failed');
                }

                const data = await response.json();

                // Simpan metadata ke server (optional)
                const metadata = {
                    nama: document.getElementById('nama').value,
                    deskripsi: document.getElementById('deskripsi').value,
                    file_name: file.name,
                    cloudinary_public_id: data.public_id,
                    cloudinary_url: data.secure_url,
                    uploaded_at: new Date().toISOString()
                };

                console.log('Upload successful:', data);
                console.log('Metadata:', metadata);

                // Show success
                successMsg.classList.add('show');

                // Show URL result
                resultUrl.value = data.secure_url;
                urlResult.classList.add('show');

                // Reset form
                form.reset();
                preview.innerHTML = '';
                fileName.textContent = '';
                selectedFile = null;

            } catch (error) {
                console.error('Upload error:', error);
                showError('❌ Upload gagal: ' + error.message);
            } finally {
                loading.style.display = 'none';
                submitBtn.disabled = false;
            }
        }

        // Show error
        function showError(msg) {
            errorMsg.textContent = msg;
            errorMsg.classList.add('show');
        }

        // Copy URL
        copyBtn.addEventListener('click', () => {
            resultUrl.select();
            document.execCommand('copy');
            copyBtn.textContent = '✅ Copied!';
            setTimeout(() => {
                copyBtn.textContent = '📋 Copy URL';
            }, 2000);
        });
    </script>
</body>

</html>
